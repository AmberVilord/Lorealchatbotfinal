<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oreal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img
          src="img/loreal-logo.png"
          alt="L'Oreal Paris logo"
          class="brand-logo"
        />
        <h1 class="site-title">Beauty Advisor</h1>
        <p class="site-subtitle">Skincare, haircare, makeup, and routines powered by AI</p>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div class="latest-question" id="latestQuestion" aria-live="polite"></div>
          <div id="chatWindow" class="chat-window" aria-live="polite">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about products, routines, or beauty tips..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oreal-inspired learning project.</p>
        <nav>
          <a href="https://www.loreal.com/en/" target="_blank" rel="noopener noreferrer">L'Oreal</a>
          <a href="https://www.loreal.com/en/commitments-and-responsibilities/" target="_blank" rel="noopener noreferrer">Commitments</a>
          <a href="https://www.loreal.com/en/contact-us/" target="_blank" rel="noopener noreferrer">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- Keep secrets.js local only. Do not commit real keys. -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
